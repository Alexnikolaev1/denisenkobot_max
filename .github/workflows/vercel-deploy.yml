# Деплой на Vercel при пуше в main. Нужен секрет VERCEL_TOKEN:
# https://vercel.com/account/tokens → создать токен → GitHub → repo → Settings → Secrets → Actions → VERCEL_TOKEN

name: Deploy Vercel Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_pg1wkBTx3XbD93H1oQ6qo7ry
      VERCEL_PROJECT_ID: prj_gLwzEWJ5OPOtW4sux4NfmHfcAtyB
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy to Vercel
        run: npx vercel deploy --prod --yes --token "${{ secrets.VERCEL_TOKEN }}"
